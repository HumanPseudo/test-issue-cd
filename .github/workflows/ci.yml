name: Auto-Link Issue

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches:
      - main

jobs:
  auto-link-issue:
    runs-on: ubuntu-latest
    # Esta condición garantiza que el script solo actúe cuando el PR se crea.
    # Si se suben más commits (synchronize) o se edita el texto (edited), el job se saltará.
    if: github.event.action == 'opened'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Auto-link and Assign
        uses: actions/github-script@v7
        with:
          script: |
            const { body: prBody, title: prTitle, number: prNumber, user: { login: prAuthor } } = context.payload.pull_request;
            
            // Regex para detectar si el usuario ya puso una palabra de cierre manualmente
            const closingKeywords = /\b(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+(#\d+|https:\/\/github\.com\/)/i;
            
            if (closingKeywords.test(prBody)) {
              return console.log("Ya existe una palabra clave de cierre. Saltando creación.");
            }

            console.log("No se encontró vínculo. Creando issue y asignando...");
            
            // 1. Crear el issue asignado al autor del PR
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Issue para PR: ${prTitle}`,
              body: `Issue creado automáticamente para el PR #${prNumber}.\n\nDescripción original:\n${prBody}`,
              assignees: [prAuthor]
            });

            const issueNumber = issue.data.number;
            console.log(`Issue #${issueNumber} creado y asignado a ${prAuthor}.`);

            // 2. Vincular el issue en la descripción del PR para que se cierre al hacer merge
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: `${prBody}\n\nFixes #${issueNumber}`
            });
            
            console.log(`PR #${prNumber} actualizado con "Fixes #${issueNumber}".`);