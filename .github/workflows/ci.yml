name: Work Logs CI

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  Check-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check issue
        uses: actions/github-script@v7
        with:
          script: |
            const { body, number: prNumber, title } = context.payload.pull_request;
            const prBody = body ?? "";
            const normalizedTitle = (title ?? "").toLowerCase();

            if (normalizedTitle.includes("prepare release")) {
              core.info("Prepare release PR detected. Skipping issue check.");
              return;
            }

            const issueReference = /(?:^|\s)(?:#\d+|https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+)\b/i;
            
            const hasBodyReference = issueReference.test(prBody);
            
            const { repository: { pullRequest: { closingIssuesReferences } } } = await github.graphql(`
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    closingIssuesReferences(first: 10) {
                      nodes { number }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              prNumber: prNumber
            });
            
            const hasLinkedIssue = closingIssuesReferences.nodes.length > 0;

            if (hasBodyReference || hasLinkedIssue) {
              core.info("Linked issue found. Skipping failure.");
              return;
            }

            const commentBody = [
              "No linked issue found. Please link an issue to this PR.",
              "",
              "You can:",
              "- Add `Fixes #123` in the PR description",
              "- Use the **Development** section in the PR sidebar",
              "",
              "**Important:** Ensure the linked issue has been properly refined.",
              "It must follow one of our official templates (**Feature Request** or",
              "**Bug Report**) with all necessary details filled in."
            ].join('\n');
                        
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });

            core.setFailed("No linked issue found. Please link an issue to this PR.");