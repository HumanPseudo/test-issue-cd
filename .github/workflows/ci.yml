name: Auto-Link Issue

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches:
      - main

jobs:
  auto-link-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check issue
        uses: actions/github-script@v7
        with:
          script: |
            const { body, number: prNumber } = context.payload.pull_request;
            const prBody = body ?? "";
            const issueReference = /(?:^|\s)(?:#\d+|https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+)\b/i;
            
            const hasBodyReference = issueReference.test(prBody);
            
            const { repository: { pullRequest: { closingIssuesReferences } } } } = await github.graphql(`
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    closingIssuesReferences(first: 10) {
                      nodes { number }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              prNumber: prNumber
            });
            
            const hasLinkedIssue = closingIssuesReferences.nodes.length > 0;
            
            if (hasBodyReference || hasLinkedIssue) {
              return console.log("Existing linked issue found.");
            }

            console.log("No linked issue found. Posting comment and failing...");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `⚠️ **Warning:** No linked issue found. Please link an issue to this PR.\n\nYou can:\n- Add \`Fixes #123\` in the PR description\n- Or use the Development section in the PR sidebar`
            });

            core.setFailed("No linked issue found. Please link an issue to this PR.");