name: Auto-Link Issue to PR

on:
  pull_request:
    types: [opened, edited]

jobs:
  auto-link:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Auto-create and link issue
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const title = pr.title;
            const prNumber = pr.number;
            
            // Regex para detectar vínculos existentes (Fixes #123, etc.)
            const regex = /(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+/i;
            
            if (regex.test(body)) {
              console.log("Ya existe un issue vinculado en la descripción.");
              return;
            }
            
            console.log("No se encontró issue vinculado. Creando uno nuevo...");
            
            // 1. Crear el issue
            const newIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Issue para PR: ${title}`,
              body: `Este issue fue creado automáticamente para el PR #${prNumber}.\n\nDescripción original del PR:\n${body}`,
              labels: ['automated']
            });
            
            const issueNumber = newIssue.data.number;
            console.log(`Issue #${issueNumber} creado.`);
            
            // 2. Actualizar el PR para vincular el nuevo issue
            const updatedBody = `${body}\n\nFixes #${issueNumber}`;
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: updatedBody
            });
            
            console.log(`PR #${prNumber} actualizado y vinculado al Issue #${issueNumber}.`);
