name: Generate Starter Issues

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Choose the type of issue to generate'
        required: true
        default: 'all'
        type: choice
        options:
          - bug
          - feature
          - all

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create Bug Issue
        if: github.event.inputs.type == 'bug' || github.event.inputs.type == 'all'
        run: |
          gh issue create \
            --title "[BUG] Initial bug detection" \
            --body "This is an automatically generated bug issue for testing purposes." \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Feature Issue
        if: github.event.inputs.type == 'feature' || github.event.inputs.type == 'all'
        run: |
          gh issue create \
            --title "[FEAT] Proposed new feature" \
            --body "This is an automatically generated feature request issue for testing purposes." \
            --label "enhancement"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
